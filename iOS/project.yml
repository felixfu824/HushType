name: VoxKey
options:
  bundleIdPrefix: com.felix
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  VoxKey:
    type: application
    platform: iOS
    sources:
      - path: VoxKey
        excludes:
          - "*.entitlements"
          - "Info.plist"
      - path: Shared
    info:
      path: VoxKey/Info.plist
      properties:
        NSMicrophoneUsageDescription: "VoxKey needs microphone access to record your voice for transcription."
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: VoxKey/VoxKey.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.felix.voxkey
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felix.voxkey
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - target: VoxKeyKeyboard
        embed: true

  VoxKeyKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: VoxKeyKeyboard
        excludes:
          - "*.entitlements"
          - "Info.plist"
      - path: Shared
    info:
      path: VoxKeyKeyboard/Info.plist
      properties:
        CFBundleDisplayName: VoxKey
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    entitlements:
      path: VoxKeyKeyboard/VoxKeyKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.felix.voxkey
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felix.voxkey.keyboard
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: false
